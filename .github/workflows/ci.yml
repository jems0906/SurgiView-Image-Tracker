name: surgiview-ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install aqtinstall
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall

      - name: Install Qt 6.5.3 (MinGW + Multimedia)
        run: |
          python -m aqt install-qt windows desktop 6.5.3 win64_mingw -m qtmultimedia --outputdir C:/Qt

      - name: Install MinGW 13.1 and Ninja tools
        run: |
          python -m aqt install-tool windows desktop tools_mingw1310 qt.tools.win64_mingw1310 --outputdir C:/qt-tools
          python -m aqt install-tool windows desktop tools_ninja qt.tools.ninja --outputdir C:/Qt

      - name: Configure
        env:
          CMAKE_PREFIX_PATH: C:/Qt/6.5.3/mingw_64
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_PREFIX_PATH="$env:CMAKE_PREFIX_PATH" `
            -DCMAKE_C_COMPILER="C:/qt-tools/Tools/mingw1310_64/bin/gcc.exe" `
            -DCMAKE_CXX_COMPILER="C:/qt-tools/Tools/mingw1310_64/bin/g++.exe" `
            -DCMAKE_MAKE_PROGRAM="C:/Qt/Tools/Ninja/ninja.exe"

      - name: Build
        run: cmake --build build -j 2

      - name: Test
        run: ctest --test-dir build --output-on-failure
